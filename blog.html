<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Connected by SUBARU(CbS)</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>...</header> <!-- ナビゲーションは元のまま -->

    <section class="page-header bg-dark">
        <h1>Blog (すばる体験日記)</h1>
        <p>サークルメンバーによる体験談や活動記録</p>
    </section>

    <section class="section">
        <div id="dynamic-article-list" class="article-list" style="max-width: 800px; margin: 0 auto;"></div>
    </section>

    <footer>...</footer>

    <script>
    document.addEventListener("DOMContentLoaded", async function() {
        const defaultBlogs = [
            { id: "default-blog-1", date: "2026年5月18日", title: "すばる望遠鏡体験企画に参加してわかった、“研究の現場”のリアル", summary: "「すばる望遠鏡」と聞くと、宇宙の美しい写真や最先端の天文学研究を思い浮かべる人が多いかもしれません。ですが、実際に現地へ...", content: "blog-article.html" },
            { id: "default-blog-2", date: "2026年5月20日", title: "サークル「CbS」キックオフ", summary: "いよいよ私たち「Connected by SUBARU(CbS)」の活動がスタートしました！...", content: "#" }
        ];

        // データがなければデフォルトをセット（バージョンチェック廃止）
        if (!localStorage.getItem('cbs_blog_posts')) {
            localStorage.setItem('cbs_blog_posts', JSON.stringify(defaultBlogs));
        }

        let blogPosts = [];
        try {
            const res = await fetch('data.json?t=' + Date.now());
            if (res.ok) {
                const sharedData = await res.json();
                blogPosts = sharedData.blog || [];
                localStorage.setItem('cbs_blog_posts', JSON.stringify(blogPosts));
            } else {
                throw new Error();
            }
        } catch (e) {
            blogPosts = JSON.parse(localStorage.getItem('cbs_blog_posts')) || defaultBlogs;
        }

        const container = document.getElementById("dynamic-article-list");
        container.innerHTML = "";

        blogPosts.forEach(post => {
            const article = document.createElement("article");
            article.style.cssText = "background:#fff;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,0.05);";
            article.innerHTML = `
                <span style="color:#888;font-size:0.9rem;">${post.date}</span>
                <h3 style="margin:10px 0;color:#0b132b;">${post.title}</h3>
                <p>${post.summary}</p>
                <a href="${post.content || "#"}" style="color:#fca311;text-decoration:none;font-weight:bold;">続きを読む →</a>
            `;
            container.appendChild(article);
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'cbs_blog_posts') location.reload();
        });
    });
    </script>
</body>
</html>
